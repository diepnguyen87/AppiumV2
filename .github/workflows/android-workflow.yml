name: Android Native CI

on:
  workflow_dispatch:

jobs:
  android-native:
    name: Android Native App

    runs-on:
      - self-hosted
      - macOS
      - mobile
      - appium

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Verify Android Device
        run: |
          adb devices
          DEVICE_COUNT=$(adb devices | awk 'NR > 1 && $2 == "device" {count++} END {print count+0}')
          if [ "$DEVICE_COUNT" -eq 0 ]; then
            echo "❌ No Android device connected."
            exit 1
          fi
          echo "✅ Found $DEVICE_COUNT Android device(s)"

      - name: Verify Appium
        run: curl http://127.0.0.1:4723/status

      - name: Run Android Tests
        run: |
          mvn clean test \
            -DisRemote=false \
            -DtestSuite=src/main/resources/Regression.xml \
            -Dudid=${{ vars.ANDROID_UDID }}