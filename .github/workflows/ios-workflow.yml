name: iOS Native CI

on:
  workflow_dispatch:

jobs:
  ios-native:
    runs-on:
      - self-hosted
      - macOS
      - ARM64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Verify Appium
        run: curl http://127.0.0.1:4723/status

      - name: Verify iPhone
        run: xctrace list devices

      - name: Run Tests
        run: |
          mvn clean test \
            -DisRemote=false \
            -DtestSuite=src/main/resources/IOS.xml \
            -Dudid=${{ vars.IOS_UDID }}

      - name: Upload allure results
        uses: actions/upload-artifact@v4
        with:
          name: appium-allure-results
          path: target/allure-results